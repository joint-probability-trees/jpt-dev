name: Run tests and build the Python distribution

on:
  push:
    branches:
      - main

  # ------------------------------------------------------------------------------------------------------------------

  workflow_call:
    inputs:
      version:
        required: true
        type: string

      python-versions:
        required: true
        type: string
        default: "cp310-cp310"

# --------------------------------------------------------------------------------------------------------------------

defaults:
  run:
    shell: bash
    working-directory: .

# --------------------------------------------------------------------------------------------------------------------

concurrency:
  group: 'jpt-building-and-deployment'
  cancel-in-progress: true

# --------------------------------------------------------------------------------------------------------------------

jobs:
  test-and-build:
    name: Build and Test the Python distribution
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ----------------------------------------------------------------------------------------------------------------

      - name: Setup python
        uses: actions/setup-python@v6
        with:
            python-version: "3.11"
            cache: pip

      # ----------------------------------------------------------------------------------------------------------------

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v1

      # ----------------------------------------------------------------------------------------------------------------

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # ----------------------------------------------------------------------------------------------------------------

      - name: Run Tests
        run: |
          cd test
          python -m unittest discover

      # ----------------------------------------------------------------------------------------------------------------

      - name: Build binary wheels
        uses: RalfG/python-wheels-manylinux-build@v0.7.1
        with:
          python-versions: ${{ inputs.python-versions || 'cp310-cp310' }}
          build-requirements: 'cython numpy setuptools-scm'
          pip-wheel-args: '-w ./dist-raw --no-deps'

      # ----------------------------------------------------------------------------------------------------------------

      - name: Install Sphinx dependencies
        uses: py-actions/py-dependency-install@v4
        with:
          path: "doc/requirements.txt"

      # ----------------------------------------------------------------------------------------------------------------

      - name: Build Sphinx documentation
        working-directory: ./doc
        run: |
          sudo apt install pandoc
          make html

      # ----------------------------------------------------------------------------------------------------------------

      - name: Make wheel available
        id: wheel_url
        uses: actions/upload-artifact@v4
        with:
          name: pyjpt-wheel
          path: dist-raw/*manylinux*.whl
